name: Docs
on:
  push:
    branches: [main]
    paths: ['website/**']
  pull_request:
    paths: ['website/**']
jobs:
  link-check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: website
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - run: npm install -g mintlify
      - run: mintlify broken-links
