kind: vibe.app/v1
id: com.example.todo
name: Todo App
version: 1.0.0
icon: assets/icon.png
runtime:
  mode: native
  composeFile: compose.yaml
services:
  - name: web
    image: ghcr.io/example/todo-web:1.0.0
    command: ["node", "server.js"]
    env:
      NODE_ENV: production
    ports:
      - container: 3000
        hostExposure: auto
    mounts:
      - source: state:uploads
        target: /data/uploads
    dependOn: ["db"]
  - name: db
    image: postgres:16
    env:
      POSTGRES_DB: todo
    stateVolumes:
      - dbdata:/var/lib/postgresql/data
state:
  autosave: true
  autosaveDebounceSeconds: 30
  retention:
    maxSnapshots: 100
  volumes:
    - name: dbdata
      consistency: postgres
    - name: uploads
      consistency: generic
security:
  network: true
  allowHostFileImport: true
secrets:
  - name: OPENAI_API_KEY
    required: true
publisher:
  name: Example Inc.
  signing:
    scheme: ed25519
    signatureFile: signatures/package.sig
    publicKeyFile: signatures/publisher.pub
