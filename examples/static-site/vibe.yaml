kind: vibe.app/v1
id: com.example.static-site
name: Static Website
version: "1.0.0"
icon: assets/icon.png

services:
  - name: web
    image: nginx:alpine
    ports:
      - container: 80
    mounts:
      - source: public
        target: /usr/share/nginx/html

security:
  network: false

publisher:
  name: Vibe Examples
