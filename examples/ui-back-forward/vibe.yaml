kind: vibe.app/v1
id: com.example.ui-back-forward
name: "UI Test: Back + Forward"
version: "1.0.0"

services:
  - name: web
    image: nginx:alpine
    ports:
      - container: 80
    mounts:
      - source: public
        target: /usr/share/nginx/html

security:
  network: false

ui:
  showBackButton: true
  showForwardButton: true

publisher:
  name: Vibe Examples
