kind: vibe.app/v1
id: com.example.sqlite-notes
name: Notes (SQLite)
version: "1.0.0"
icon: assets/icon.png

services:
  - name: web
    image: node:22-alpine
    command: ["node", "--no-warnings", "--experimental-sqlite", "server.mjs"]
    ports:
      - container: 3000
    mounts:
      - source: data
        target: /data

state:
  volumes:
    - name: data

security:
  network: true

publisher:
  name: Vibe Examples
