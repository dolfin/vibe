<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
  <defs>
    <path
      id="pageShape"
      d="M212 126H614L866 378V964C866 982.778 850.778 998 832 998H210C191.222 998 176 982.778 176 964V160C176 141.222 191.222 126 210 126H212Z"
    />
    <clipPath id="pageClip">
      <use href="#pageShape" />
    </clipPath>

    <linearGradient id="foldFill" x1="8%" y1="6%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F7F7F8" />
      <stop offset="68%" stop-color="#E7E7EA" />
      <stop offset="100%" stop-color="#D7D7DB" />
    </linearGradient>
    <linearGradient id="foldHighlight" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.28" />
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0" />
    </linearGradient>
    <linearGradient id="foldVerticalShadow" x1="680" y1="252" x2="592" y2="252" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#040012" stop-opacity="0.32" />
      <stop offset="38%" stop-color="#12004B" stop-opacity="0.14" />
      <stop offset="100%" stop-color="#12004B" stop-opacity="0" />
    </linearGradient>
    <linearGradient id="foldBottomShadow" x1="740" y1="378" x2="740" y2="420" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#040012" stop-opacity="0.24" />
      <stop offset="100%" stop-color="#12004B" stop-opacity="0" />
    </linearGradient>

    <filter id="foldShadowBlur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" />
    </filter>
    <filter id="pageShadow" x="-15%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="10" stdDeviation="24" flood-color="#000000" flood-opacity="0.45" />
    </filter>
  </defs>

  <!-- Page drop shadow -->
  <use href="#pageShape" fill="#000000" opacity="0.35" filter="url(#pageShadow)" transform="translate(0,6)" />

  <!-- Page content clipped to page shape -->
  <g clip-path="url(#pageClip)">

    <!-- Background image covers full canvas so clip handles all edges -->
    <image
      href="vibe-bg-large.png"
      x="0" y="0" width="1024" height="1024"
      preserveAspectRatio="xMidYMid slice"
    />

    <!-- Wizard hat logo, large and centered in the page -->
    <image
      href="logo-fg.png"
      x="211" y="380" width="620" height="620"
      preserveAspectRatio="xMidYMid meet"
    />

    <!-- Fold vertical shadow -->
    <path
      d="M614 126L614 312C614 348.451 643.549 378 680 378L680 396C633.608 396 596 358.392 596 312L596 126Z"
      fill="url(#foldVerticalShadow)"
      filter="url(#foldShadowBlur)"
      opacity="0.9"
    />
    <!-- Fold bottom shadow -->
    <path
      d="M680 378H866V404H680C649.509 404 620.741 391.528 598.994 369.822L614.55 354.235C632.248 371.891 655.741 381.601 680 381.601H866V378Z"
      fill="url(#foldBottomShadow)"
      filter="url(#foldShadowBlur)"
      opacity="0.82"
    />

    <!-- Fold triangle -->
    <path
      d="M614 126L866 378H680C643.549 378 614 348.451 614 312V126Z"
      fill="url(#foldFill)"
    />
    <path
      d="M614 126L866 378H680C643.549 378 614 348.451 614 312V126Z"
      fill="url(#foldHighlight)"
    />

  </g>
</svg>
